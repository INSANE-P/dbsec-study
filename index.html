<!doctype html>
<html lang="ko" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="데이터베이스 보안 시험 공부 — 중간/기말 기출 유형 문제풀이와 셀프 채점, 개념 정리"
    />
    <meta name="theme-color" content="#3f63d9" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <title>데이터베이스 보안 시험 공부</title>
    <script>
      // GitHub Pages SPA 경로 복원: 404.html 이 인코딩한 경로(?/...)를 원래 경로로 되돌린다.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script>
      // 다크모드 깜빡임 방지: 페인트 전에 테마 클래스를 미리 적용
      (function () {
        try {
          var t = localStorage.getItem("dbsec.theme");
          if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
